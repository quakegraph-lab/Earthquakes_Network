name: Earthquakes_Network
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.11,<3.14      # 3.14 RC builds trigger missing _python_rc channel

  # ── Core scientific stack ───────────────────────────────────────────────────
  - numpy>=2.0
  - pandas>=2.0
  - scipy>=1.12

  # ── Network analysis ────────────────────────────────────────────────────────
  - networkx>=3.3

  # ── Visualisation ───────────────────────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.13
  - plotly>=5.18
  - python-kaleido>=0.2   # static Plotly export (PDF/JPG)

  # ── Geospatial ──────────────────────────────────────────────────────────────
  - geopandas>=1.0

  # ── Machine learning / clustering ──────────────────────────────────────────
  - scikit-learn>=1.4

  # ── Community detection ─────────────────────────────────────────────────────
  - infomap>=2.7
  - leidenalg>=0.10
  - python-igraph>=0.11
  - hdbscan>=0.8.33
  # karateclub is in the pip section — conda-forge build requires pandas <=1.3.5

  # ── Power-law fitting ───────────────────────────────────────────────────────
  - powerlaw>=1.4

  # ── Notebook infrastructure ─────────────────────────────────────────────────
  - jupyterlab>=4.0
  - nbformat>=5.9

  # ── pip-only packages ───────────────────────────────────────────────────────
  - pip
  - pip:
    - fa2-modified>=0.3    # ForceAtlas2; only on PyPI
    - karateclub>=1.3.3    # BigCLAM; conda-forge build incompatible with pandas>=2.0
